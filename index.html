<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <nav>
            <div class="left">TODO</div>
            <div class="right" id="toggle-modal">
                <button>Add Task</button>
            </div>
        </nav>
        <section class="board">
            <div id="todo" class="task-column">
                <div class="heading">
                    <div class="left">Task</div>
                    <div class="right">count</div>
                    
                </div>
                <div draggable="true" class="task" >
                    <h2>problem Solving</h2>
                    <p>description</p>
                    <button>Delete</button>
                </div>
            </div>
            <div id="progress" class="task-column">
                 <div class="heading">
                    <div class="left">In progress</div>
                    <div class="right">count</div>
                </div>
                <div draggable="true" class="Inprogress" >
                    
                </div>
            </div>
            <div id="done" class="task-column">
                 <div class="heading">
                    <div class="left">Done</div>
                    <div class="right">count</div>
                </div>
            </div>
        </section>
    </main>
    <div class="modal">
        <div class="bg"></div>
        <div class="center">
        <input type="text" placeholder="Task Title" id = "modal-title">
        <textarea  id="modal-textarea" placeholder="Description"></textarea>
        <button id="add-new-task" class="add-task-bnt">Add Task</button>
        </div>

    </div>
    <script src="app.js"></script>
</body>
</html>
